name: Run HLTB Scraper and Upload CSV

on:
  workflow_dispatch:  # allows manual trigger
  schedule:
    - cron: '0 1 * * 0'  # every Sunday at 01:00 UTC

permissions:
  contents: write  # create releases
  actions: write   # keep-alive: re-enable own schedule

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 1440
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v3

      # GitHub disables scheduled workflows after 60 days without repo
      # activity; releases don't count. Re-enabling ourselves resets the clock.
      - name: ♻️ Keep schedule alive
        run: gh api -X PUT "repos/${{ github.repository }}/actions/workflows/scrape.yml/enable"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📅 Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏃 Run scraper
        run: npm start

      - name: 📤 Upload CSV artifact
        uses: ncipollo/release-action@v1
        if: success()
        with:
          makeLatest: true
          removeArtifacts: true
          artifacts: howlongtobeat_games.csv
          commit: ${{ github.sha }}
          tag: "scrape-${{ steps.date.outputs.date }}"
          name: "Weekly Scrape - ${{ steps.date.outputs.date }}"
